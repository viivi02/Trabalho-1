<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Pedidos Marketplace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #1a1a2e; }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff; padding: 1.5rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 10px rgba(0,0,0,.15);
        }
        .header h1 { font-size: 1.5rem; font-weight: 600; }
        .header a { color: #a8dadc; text-decoration: none; font-size: .9rem; }
        .header a:hover { text-decoration: underline; }

        .stats {
            display: flex; gap: 1rem; padding: 1.5rem 2rem; flex-wrap: wrap;
        }
        .stat-card {
            background: #fff; border-radius: 12px; padding: 1.2rem 1.5rem;
            flex: 1; min-width: 180px; box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }
        .stat-card .label { font-size: .8rem; color: #6c757d; text-transform: uppercase; letter-spacing: .5px; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; color: #1a1a2e; margin-top: .3rem; }

        .filters {
            background: #fff; margin: 0 2rem; padding: 1.2rem 1.5rem;
            border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06);
            display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end;
        }
        .filter-group { display: flex; flex-direction: column; gap: .3rem; }
        .filter-group label { font-size: .75rem; color: #6c757d; text-transform: uppercase; letter-spacing: .5px; }
        .filter-group input, .filter-group select {
            padding: .5rem .8rem; border: 1px solid #dee2e6; border-radius: 8px;
            font-size: .9rem; outline: none; transition: border-color .2s;
        }
        .filter-group input:focus, .filter-group select:focus { border-color: #457b9d; }
        .btn {
            padding: .55rem 1.3rem; border: none; border-radius: 8px;
            font-size: .9rem; cursor: pointer; font-weight: 500; transition: all .2s;
        }
        .btn-primary { background: #457b9d; color: #fff; }
        .btn-primary:hover { background: #1d3557; }
        .btn-secondary { background: #e9ecef; color: #495057; }
        .btn-secondary:hover { background: #dee2e6; }

        .table-wrapper {
            margin: 1.5rem 2rem; background: #fff; border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        thead { background: #f8f9fa; }
        th { padding: .8rem 1rem; text-align: left; font-size: .75rem; text-transform: uppercase; color: #6c757d; letter-spacing: .5px; border-bottom: 2px solid #e9ecef; }
        td { padding: .75rem 1rem; font-size: .9rem; border-bottom: 1px solid #f1f3f5; }
        tbody tr { cursor: pointer; transition: background .15s; }
        tbody tr:hover { background: #f8f9fa; }

        .status-badge {
            display: inline-block; padding: .25rem .6rem; border-radius: 20px;
            font-size: .75rem; font-weight: 600; text-transform: uppercase;
        }
        .status-CREATED { background: #dbeafe; color: #1e40af; }
        .status-PAID { background: #d1fae5; color: #065f46; }
        .status-SHIPPED { background: #fef3c7; color: #92400e; }
        .status-DELIVERED { background: #d1fae5; color: #065f46; }
        .status-CANCELED, .status-CANCELLED { background: #fee2e2; color: #991b1b; }
        .status-PENDING { background: #fef3c7; color: #92400e; }
        .status-CONFIRMED { background: #dbeafe; color: #1e40af; }
        .status-SEPARATED { background: #e0e7ff; color: #3730a3; }

        .pagination {
            display: flex; justify-content: center; align-items: center;
            gap: .5rem; padding: 1rem 2rem; flex-wrap: wrap;
        }
        .pagination button {
            padding: .4rem .8rem; border: 1px solid #dee2e6; border-radius: 6px;
            background: #fff; cursor: pointer; font-size: .85rem; transition: all .15s;
        }
        .pagination button:hover:not(:disabled) { background: #457b9d; color: #fff; border-color: #457b9d; }
        .pagination button:disabled { opacity: .4; cursor: default; }
        .pagination button.active { background: #1d3557; color: #fff; border-color: #1d3557; }
        .page-info { font-size: .85rem; color: #6c757d; }

        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
            z-index: 1000; justify-content: center; align-items: center; padding: 2rem;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #fff; border-radius: 16px; width: 100%; max-width: 800px;
            max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3);
        }
        .modal-header {
            padding: 1.5rem; border-bottom: 1px solid #e9ecef;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: #fff; border-radius: 16px 16px 0 0; z-index: 1;
        }
        .modal-header h2 { font-size: 1.2rem; }
        .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #6c757d; padding: .2rem .5rem; }
        .modal-close:hover { color: #1a1a2e; }
        .modal-body { padding: 1.5rem; }

        .detail-section { margin-bottom: 1.5rem; }
        .detail-section h3 { font-size: .9rem; color: #457b9d; text-transform: uppercase; letter-spacing: .5px; margin-bottom: .8rem; padding-bottom: .4rem; border-bottom: 2px solid #e9ecef; }
        .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: .8rem; }
        .detail-item .dt { font-size: .7rem; color: #6c757d; text-transform: uppercase; letter-spacing: .5px; }
        .detail-item .dd { font-size: .95rem; font-weight: 500; margin-top: .15rem; }

        .items-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
        .items-table th { background: #f8f9fa; padding: .6rem .8rem; text-align: left; font-size: .7rem; text-transform: uppercase; color: #6c757d; }
        .items-table td { padding: .6rem .8rem; border-bottom: 1px solid #f1f3f5; }

        .empty-state { text-align: center; padding: 3rem; color: #6c757d; }
        .loading { text-align: center; padding: 2rem; color: #6c757d; }

        @media (max-width: 768px) {
            .header { flex-direction: column; gap: .5rem; }
            .stats, .filters { padding: 1rem; }
            .table-wrapper { margin: 1rem; }
            th:nth-child(4), td:nth-child(4),
            th:nth-child(5), td:nth-child(5) { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Pedidos Marketplace</h1>
        <a href="/swagger-ui.html" target="_blank">Swagger UI &rarr;</a>
    </div>

    <div class="stats">
        <div class="stat-card"><div class="label">Total de Pedidos</div><div class="value" id="totalOrders">-</div></div>
        <div class="stat-card"><div class="label">Pagina Atual</div><div class="value" id="currentPage">-</div></div>
        <div class="stat-card"><div class="label">Total de Paginas</div><div class="value" id="totalPages">-</div></div>
    </div>

    <div class="filters">
        <div class="filter-group">
            <label>Status</label>
            <select id="filterStatus">
                <option value="">Todos</option>
                <option value="CREATED">Created</option>
                <option value="PAID">Paid</option>
                <option value="SHIPPED">Shipped</option>
                <option value="DELIVERED">Delivered</option>
                <option value="PENDING">Pending</option>
                <option value="CONFIRMED">Confirmed</option>
                <option value="SEPARATED">Separated</option>
                <option value="CANCELLED">Cancelled</option>
            </select>
        </div>
        <div class="filter-group">
            <label>ID Cliente</label>
            <input type="number" id="filterCustomer" placeholder="Ex: 101">
        </div>
        <div class="filter-group">
            <label>ID Produto</label>
            <input type="number" id="filterProduct" placeholder="Ex: 5001">
        </div>
        <button class="btn btn-primary" onclick="loadOrders(0)">Filtrar</button>
        <button class="btn btn-secondary" onclick="clearFilters()">Limpar</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>UUID</th>
                    <th>Cliente</th>
                    <th>Status</th>
                    <th>Canal</th>
                    <th>Total</th>
                    <th>Data</th>
                </tr>
            </thead>
            <tbody id="ordersBody">
                <tr><td colspan="6" class="loading">Carregando...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" id="pagination"></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2>Detalhes do Pedido</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <div class="loading">Carregando...</div>
            </div>
        </div>
    </div>

    <script>
        let currentPageNum = 0;
        const PAGE_SIZE = 20;

        function buildUrl(page) {
            const params = new URLSearchParams();
            params.set('page', page);
            params.set('size', PAGE_SIZE);

            const status = document.getElementById('filterStatus').value;
            const customer = document.getElementById('filterCustomer').value;
            const product = document.getElementById('filterProduct').value;

            if (status) params.set('status', status);
            if (customer) params.set('customer_id', customer);
            if (product) params.set('product_id', product);

            return '/orders?' + params.toString();
        }

        async function loadOrders(page) {
            currentPageNum = page;
            const tbody = document.getElementById('ordersBody');
            tbody.innerHTML = '<tr><td colspan="6" class="loading">Carregando...</td></tr>';

            try {
                const res = await fetch(buildUrl(page));
                const data = await res.json();

                document.getElementById('totalOrders').textContent = data.page.totalElements;
                document.getElementById('currentPage').textContent = (data.page.number + 1);
                document.getElementById('totalPages').textContent = data.page.totalPages;

                if (!data.content || data.content.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Nenhum pedido encontrado</td></tr>';
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }

                tbody.innerHTML = data.content.map(o => `
                    <tr onclick="openDetail('${o.uuid}')">
                        <td><code>${o.uuid.substring(0, 16)}...</code></td>
                        <td>${o.customer ? o.customer.name : '-'}</td>
                        <td><span class="status-badge status-${o.status}">${o.status}</span></td>
                        <td>${o.channel || '-'}</td>
                        <td>R$ ${Number(o.total).toFixed(2)}</td>
                        <td>${formatDate(o.created_at)}</td>
                    </tr>
                `).join('');

                renderPagination(data.page);
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="6" class="empty-state">Erro ao carregar: ${err.message}</td></tr>`;
            }
        }

        function renderPagination(page) {
            const container = document.getElementById('pagination');
            const totalPages = page.totalPages;
            const current = page.number;

            if (totalPages <= 1) { container.innerHTML = ''; return; }

            let html = `<button ${current === 0 ? 'disabled' : ''} onclick="loadOrders(${current - 1})">&laquo; Anterior</button>`;

            const start = Math.max(0, current - 2);
            const end = Math.min(totalPages, current + 3);

            if (start > 0) html += `<button onclick="loadOrders(0)">1</button>`;
            if (start > 1) html += `<span class="page-info">...</span>`;

            for (let i = start; i < end; i++) {
                html += `<button class="${i === current ? 'active' : ''}" onclick="loadOrders(${i})">${i + 1}</button>`;
            }

            if (end < totalPages - 1) html += `<span class="page-info">...</span>`;
            if (end < totalPages) html += `<button onclick="loadOrders(${totalPages - 1})">${totalPages}</button>`;

            html += `<button ${current >= totalPages - 1 ? 'disabled' : ''} onclick="loadOrders(${current + 1})">Proximo &raquo;</button>`;
            html += `<span class="page-info">${page.totalElements} pedidos</span>`;

            container.innerHTML = html;
        }

        async function openDetail(uuid) {
            const overlay = document.getElementById('modalOverlay');
            const body = document.getElementById('modalBody');
            overlay.classList.add('active');
            body.innerHTML = '<div class="loading">Carregando...</div>';

            try {
                const res = await fetch('/orders/' + uuid);
                const o = await res.json();

                body.innerHTML = `
                    <div class="detail-section">
                        <h3>Pedido</h3>
                        <div class="detail-grid">
                            <div class="detail-item"><div class="dt">UUID</div><div class="dd">${o.uuid}</div></div>
                            <div class="detail-item"><div class="dt">Status</div><div class="dd"><span class="status-badge status-${o.status}">${o.status}</span></div></div>
                            <div class="detail-item"><div class="dt">Canal</div><div class="dd">${o.channel || '-'}</div></div>
                            <div class="detail-item"><div class="dt">Total</div><div class="dd">R$ ${Number(o.total).toFixed(2)}</div></div>
                            <div class="detail-item"><div class="dt">Criado em</div><div class="dd">${formatDate(o.created_at)}</div></div>
                            <div class="detail-item"><div class="dt">Indexado em</div><div class="dd">${formatDate(o.indexed_at)}</div></div>
                        </div>
                    </div>

                    <div class="detail-section">
                        <h3>Cliente</h3>
                        <div class="detail-grid">
                            <div class="detail-item"><div class="dt">ID</div><div class="dd">${o.customer.id}</div></div>
                            <div class="detail-item"><div class="dt">Nome</div><div class="dd">${o.customer.name}</div></div>
                            <div class="detail-item"><div class="dt">Email</div><div class="dd">${o.customer.email || '-'}</div></div>
                            <div class="detail-item"><div class="dt">Documento</div><div class="dd">${o.customer.document || '-'}</div></div>
                        </div>
                    </div>

                    <div class="detail-section">
                        <h3>Vendedor</h3>
                        <div class="detail-grid">
                            <div class="detail-item"><div class="dt">ID</div><div class="dd">${o.seller.id}</div></div>
                            <div class="detail-item"><div class="dt">Nome</div><div class="dd">${o.seller.name}</div></div>
                            <div class="detail-item"><div class="dt">Cidade</div><div class="dd">${o.seller.city || '-'}</div></div>
                            <div class="detail-item"><div class="dt">Estado</div><div class="dd">${o.seller.state || '-'}</div></div>
                        </div>
                    </div>

                    <div class="detail-section">
                        <h3>Itens (${o.items.length})</h3>
                        <table class="items-table">
                            <thead><tr><th>Produto</th><th>Categoria</th><th>Qtd</th><th>Preco Unit.</th><th>Total</th></tr></thead>
                            <tbody>
                                ${o.items.map(i => `
                                    <tr>
                                        <td>${i.product_name} <small>(#${i.product_id})</small></td>
                                        <td>${i.category ? i.category.name + (i.category.sub_category ? ' / ' + i.category.sub_category.name : '') : '-'}</td>
                                        <td>${i.quantity}</td>
                                        <td>R$ ${Number(i.unit_price).toFixed(2)}</td>
                                        <td>R$ ${Number(i.total).toFixed(2)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>

                    <div class="detail-section">
                        <h3>Envio</h3>
                        <div class="detail-grid">
                            <div class="detail-item"><div class="dt">Transportadora</div><div class="dd">${o.shipment.carrier || '-'}</div></div>
                            <div class="detail-item"><div class="dt">Servico</div><div class="dd">${o.shipment.service || '-'}</div></div>
                            <div class="detail-item"><div class="dt">Status</div><div class="dd">${o.shipment.status || '-'}</div></div>
                            <div class="detail-item"><div class="dt">Rastreio</div><div class="dd">${o.shipment.tracking_code || '-'}</div></div>
                        </div>
                    </div>

                    <div class="detail-section">
                        <h3>Pagamento</h3>
                        <div class="detail-grid">
                            <div class="detail-item"><div class="dt">Metodo</div><div class="dd">${o.payment.method || '-'}</div></div>
                            <div class="detail-item"><div class="dt">Status</div><div class="dd">${o.payment.status || '-'}</div></div>
                            <div class="detail-item"><div class="dt">Transacao</div><div class="dd">${o.payment.transaction_id || '-'}</div></div>
                        </div>
                    </div>

                    <div class="detail-section">
                        <h3>Metadata</h3>
                        <div class="detail-grid">
                            <div class="detail-item"><div class="dt">Source</div><div class="dd">${o.metadata.source || '-'}</div></div>
                            <div class="detail-item"><div class="dt">User Agent</div><div class="dd">${o.metadata.user_agent || '-'}</div></div>
                            <div class="detail-item"><div class="dt">IP</div><div class="dd">${o.metadata.ip_address || '-'}</div></div>
                        </div>
                    </div>
                `;
            } catch (err) {
                body.innerHTML = `<div class="empty-state">Erro ao carregar detalhes: ${err.message}</div>`;
            }
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        function clearFilters() {
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterCustomer').value = '';
            document.getElementById('filterProduct').value = '';
            loadOrders(0);
        }

        function formatDate(dt) {
            if (!dt) return '-';
            try {
                const d = new Date(dt);
                return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            } catch { return dt; }
        }

        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        loadOrders(0);
    </script>
</body>
</html>
