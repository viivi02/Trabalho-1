<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace Orders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f13; --bg-card: #1a1a23; --bg-card-hover: #22222e;
            --bg-input: #14141c; --border: #2a2a3a; --border-light: #333346;
            --text: #e4e4ed; --text-muted: #8888a4; --text-dim: #5c5c78;
            --accent: #6c5ce7; --accent-hover: #7c6cf7; --accent-glow: rgba(108,92,231,.25);
            --green: #00b894; --green-bg: rgba(0,184,148,.12);
            --yellow: #fdcb6e; --yellow-bg: rgba(253,203,110,.12);
            --red: #e17055; --red-bg: rgba(225,112,85,.12);
            --blue: #74b9ff; --blue-bg: rgba(116,185,255,.12);
            --purple: #a29bfe; --purple-bg: rgba(162,155,254,.12);
            --radius: 14px; --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        .app { max-width: 1400px; margin: 0 auto; padding: 0 1.5rem 3rem; }

        .header {
            padding: 2rem 0; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); margin-bottom: 2rem;
        }
        .header-left h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -.5px; }
        .header-left h1 span { color: var(--accent); }
        .header-left p { color: var(--text-muted); font-size: .85rem; margin-top: .2rem; }
        .header-right { display: flex; gap: .8rem; align-items: center; }
        .header-link {
            color: var(--text-muted); text-decoration: none; font-size: .8rem;
            padding: .5rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-sm);
            transition: all .2s;
        }
        .header-link:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-glow); }
        .refresh-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

        .stats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem;
        }
        .stat {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 1.3rem 1.5rem; position: relative; overflow: hidden; transition: all .25s;
        }
        .stat:hover { border-color: var(--border-light); transform: translateY(-2px); }
        .stat .icon {
            width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-size: 1.1rem; margin-bottom: .8rem;
        }
        .stat .icon.purple { background: var(--purple-bg); color: var(--purple); }
        .stat .icon.green { background: var(--green-bg); color: var(--green); }
        .stat .icon.blue { background: var(--blue-bg); color: var(--blue); }
        .stat .icon.yellow { background: var(--yellow-bg); color: var(--yellow); }
        .stat .label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
        .stat .val { font-size: 1.8rem; font-weight: 800; margin-top: .2rem; font-variant-numeric: tabular-nums; }
        .stat::after {
            content: ''; position: absolute; top: 0; right: 0; width: 80px; height: 80px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            opacity: 0; transition: opacity .3s;
        }
        .stat:hover::after { opacity: 1; }

        .toolbar {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 1rem 1.2rem; display: flex; gap: .8rem; flex-wrap: wrap; align-items: center;
            margin-bottom: 1.5rem;
        }
        .toolbar select, .toolbar input {
            background: var(--bg-input); color: var(--text); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: .55rem .9rem; font-size: .85rem;
            font-family: inherit; outline: none; transition: all .2s; min-width: 140px;
        }
        .toolbar select:focus, .toolbar input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .toolbar input::placeholder { color: var(--text-dim); }
        .toolbar-spacer { flex: 1; }
        .btn {
            padding: .55rem 1.2rem; border: none; border-radius: var(--radius-sm);
            font-size: .85rem; font-family: inherit; font-weight: 600; cursor: pointer; transition: all .2s;
        }
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-accent:hover { background: var(--accent-hover); box-shadow: 0 4px 15px var(--accent-glow); transform: translateY(-1px); }
        .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
        .btn-ghost:hover { color: var(--text); border-color: var(--border-light); }

        .table-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            padding: .75rem 1.2rem; font-size: .7rem; text-transform: uppercase; letter-spacing: .8px;
            color: var(--text-muted); text-align: left; background: var(--bg-input); border-bottom: 1px solid var(--border);
            font-weight: 600;
        }
        tbody td { padding: .85rem 1.2rem; font-size: .88rem; border-bottom: 1px solid var(--border); }
        tbody tr { cursor: pointer; transition: background .15s; }
        tbody tr:hover { background: var(--bg-card-hover); }
        tbody tr:last-child td { border-bottom: none; }
        .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: .8rem; color: var(--text-muted); }
        .currency { font-variant-numeric: tabular-nums; font-weight: 600; }

        .badge {
            display: inline-flex; align-items: center; gap: .3rem; padding: .25rem .7rem; border-radius: 20px;
            font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
        }
        .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
        .badge-CREATED, .badge-CONFIRMED { background: var(--blue-bg); color: var(--blue); }
        .badge-CREATED::before, .badge-CONFIRMED::before { background: var(--blue); }
        .badge-PAID, .badge-DELIVERED { background: var(--green-bg); color: var(--green); }
        .badge-PAID::before, .badge-DELIVERED::before { background: var(--green); }
        .badge-SHIPPED, .badge-PENDING, .badge-SEPARATED { background: var(--yellow-bg); color: var(--yellow); }
        .badge-SHIPPED::before, .badge-PENDING::before, .badge-SEPARATED::before { background: var(--yellow); }
        .badge-CANCELED, .badge-CANCELLED { background: var(--red-bg); color: var(--red); }
        .badge-CANCELED::before, .badge-CANCELLED::before { background: var(--red); }

        .pagination {
            display: flex; justify-content: center; align-items: center; gap: .4rem; padding: 1.5rem 0;
        }
        .pagination button {
            width: 36px; height: 36px; border: 1px solid var(--border); border-radius: var(--radius-sm);
            background: var(--bg-card); color: var(--text-muted); cursor: pointer;
            font-size: .85rem; font-family: inherit; transition: all .15s; display: flex; align-items: center; justify-content: center;
        }
        .pagination button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
        .pagination button:disabled { opacity: .3; cursor: default; }
        .pagination button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .pagination .nav-btn { width: auto; padding: 0 .8rem; font-size: .8rem; }
        .page-meta { font-size: .8rem; color: var(--text-dim); margin-left: 1rem; }

        .overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(8px);
            z-index: 1000; justify-content: center; align-items: flex-start; padding: 4vh 1.5rem;
            overflow-y: auto;
        }
        .overlay.open { display: flex; animation: fadeIn .2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            width: 100%; max-width: 860px; animation: slideUp .3s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .modal-top {
            padding: 1.5rem 1.8rem; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-top h2 { font-size: 1.1rem; font-weight: 700; }
        .modal-close {
            width: 32px; height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--border);
            background: transparent; color: var(--text-muted); cursor: pointer; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center; transition: all .2s;
        }
        .modal-close:hover { background: var(--red-bg); color: var(--red); border-color: var(--red); }
        .modal-content { padding: 1.8rem; }

        .section { margin-bottom: 2rem; }
        .section:last-child { margin-bottom: 0; }
        .section-title {
            font-size: .72rem; text-transform: uppercase; letter-spacing: 1.2px; color: var(--accent);
            font-weight: 700; margin-bottom: 1rem; padding-bottom: .5rem; border-bottom: 1px solid var(--border);
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; }
        .field .label { font-size: .68rem; text-transform: uppercase; letter-spacing: .8px; color: var(--text-dim); }
        .field .value { font-size: .95rem; font-weight: 500; margin-top: .15rem; word-break: break-all; }

        .items-tbl { width: 100%; border-collapse: collapse; font-size: .85rem; }
        .items-tbl th { padding: .6rem .8rem; text-align: left; font-size: .68rem; text-transform: uppercase; letter-spacing: .8px; color: var(--text-muted); background: var(--bg-input); }
        .items-tbl td { padding: .65rem .8rem; border-bottom: 1px solid var(--border); }
        .items-tbl tr:last-child td { border-bottom: none; }
        .items-tbl .total-row td { font-weight: 700; border-top: 2px solid var(--accent); color: var(--accent); }

        .empty { text-align: center; padding: 4rem 2rem; color: var(--text-dim); }
        .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: .3; }
        .loading-spinner { text-align: center; padding: 3rem; color: var(--text-dim); }

        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            th:nth-child(4), td:nth-child(4) { display: none; }
        }
        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .header { flex-direction: column; gap: 1rem; align-items: flex-start; }
            th:nth-child(5), td:nth-child(5) { display: none; }
        }
    </style>
</head>
<body>
<div class="app">
    <header class="header">
        <div class="header-left">
            <h1><span>Marketplace</span> Orders</h1>
            <p>Monitoramento de pedidos em tempo real via Pub/Sub</p>
        </div>
        <div class="header-right">
            <div class="refresh-dot" title="Consumer conectado"></div>
            <a class="header-link" href="/swagger-ui.html" target="_blank">API Docs</a>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat">
            <div class="icon purple">&#x23F3;</div>
            <div class="label">Total de Pedidos</div>
            <div class="val" id="sTotalOrders">--</div>
        </div>
        <div class="stat">
            <div class="icon green">&#x2714;</div>
            <div class="label">Receita Total</div>
            <div class="val" id="sRevenue">--</div>
        </div>
        <div class="stat">
            <div class="icon blue">&#x1F4C4;</div>
            <div class="label">Pagina</div>
            <div class="val" id="sPage">--</div>
        </div>
        <div class="stat">
            <div class="icon yellow">&#x1F4CA;</div>
            <div class="label">Total Paginas</div>
            <div class="val" id="sPages">--</div>
        </div>
    </div>

    <div class="toolbar">
        <select id="fStatus">
            <option value="">Status: Todos</option>
            <option value="CREATED">Created</option>
            <option value="PAID">Paid</option>
            <option value="SHIPPED">Shipped</option>
            <option value="DELIVERED">Delivered</option>
            <option value="PENDING">Pending</option>
            <option value="CONFIRMED">Confirmed</option>
            <option value="SEPARATED">Separated</option>
            <option value="CANCELLED">Cancelled</option>
        </select>
        <input type="number" id="fCustomer" placeholder="ID Cliente">
        <input type="number" id="fProduct" placeholder="ID Produto">
        <div class="toolbar-spacer"></div>
        <button class="btn btn-ghost" onclick="clearFilters()">Limpar</button>
        <button class="btn btn-accent" onclick="loadOrders(0)">Buscar</button>
    </div>

    <div class="table-card">
        <table>
            <thead><tr><th>UUID</th><th>Cliente</th><th>Status</th><th>Canal</th><th>Total</th><th>Data</th></tr></thead>
            <tbody id="tbody"><tr><td colspan="6" class="loading-spinner">Carregando...</td></tr></tbody>
        </table>
    </div>

    <div class="pagination" id="pag"></div>
</div>

<div class="overlay" id="overlay">
    <div class="modal">
        <div class="modal-top">
            <h2 id="modalTitle">Detalhes do Pedido</h2>
            <button class="modal-close" onclick="close()">&times;</button>
        </div>
        <div class="modal-content" id="modalBody"><div class="loading-spinner">Carregando...</div></div>
    </div>
</div>

<script>
const $ = id => document.getElementById(id);
const PAGE_SIZE = 20;
let revenue = 0;

function url(page) {
    const p = new URLSearchParams({ page, size: PAGE_SIZE });
    const s = $('fStatus').value, c = $('fCustomer').value, pr = $('fProduct').value;
    if (s) p.set('status', s);
    if (c) p.set('customer_id', c);
    if (pr) p.set('product_id', pr);
    return '/orders?' + p;
}

async function loadOrders(page) {
    const tbody = $('tbody');
    tbody.innerHTML = '<tr><td colspan="6" class="loading-spinner">Carregando...</td></tr>';

    try {
        const res = await fetch(url(page));
        const data = await res.json();
        const { totalElements, number, totalPages } = data.page;

        $('sTotalOrders').textContent = totalElements.toLocaleString('pt-BR');
        $('sPage').textContent = number + 1;
        $('sPages').textContent = totalPages;

        if (!data.content?.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty"><div class="empty-icon">&#x1F4E6;</div>Nenhum pedido encontrado</td></tr>';
            $('pag').innerHTML = '';
            $('sRevenue').textContent = 'R$ 0';
            return;
        }

        revenue = data.content.reduce((sum, o) => sum + Number(o.total), 0);
        $('sRevenue').textContent = 'R$ ' + revenue.toLocaleString('pt-BR', { minimumFractionDigits: 2 });

        tbody.innerHTML = data.content.map(o => `
            <tr onclick="detail('${o.uuid}')">
                <td class="mono">${o.uuid.substring(0, 13)}...</td>
                <td>${o.customer?.name || '-'}</td>
                <td><span class="badge badge-${o.status}">${o.status}</span></td>
                <td>${o.channel || '-'}</td>
                <td class="currency">R$ ${Number(o.total).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                <td>${fmtDate(o.created_at)}</td>
            </tr>
        `).join('');

        paginate(number, totalPages, totalElements);
    } catch (e) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty">Erro: ${e.message}</td></tr>`;
    }
}

function paginate(cur, total, elements) {
    if (total <= 1) { $('pag').innerHTML = ''; return; }
    let h = `<button class="nav-btn" ${cur === 0 ? 'disabled' : ''} onclick="loadOrders(${cur - 1})">&#8592; Anterior</button>`;
    const s = Math.max(0, cur - 2), e = Math.min(total, cur + 3);
    if (s > 0) h += `<button onclick="loadOrders(0)">1</button>`;
    if (s > 1) h += `<span class="page-meta">...</span>`;
    for (let i = s; i < e; i++) h += `<button class="${i === cur ? 'active' : ''}" onclick="loadOrders(${i})">${i + 1}</button>`;
    if (e < total - 1) h += `<span class="page-meta">...</span>`;
    if (e < total) h += `<button onclick="loadOrders(${total - 1})">${total}</button>`;
    h += `<button class="nav-btn" ${cur >= total - 1 ? 'disabled' : ''} onclick="loadOrders(${cur + 1})">Proximo &#8594;</button>`;
    h += `<span class="page-meta">${elements.toLocaleString('pt-BR')} pedidos</span>`;
    $('pag').innerHTML = h;
}

async function detail(uuid) {
    const ov = $('overlay'), body = $('modalBody');
    ov.classList.add('open');
    body.innerHTML = '<div class="loading-spinner">Carregando...</div>';

    try {
        const o = await (await fetch('/orders/' + uuid)).json();
        $('modalTitle').textContent = `Pedido ${o.uuid.substring(0, 13)}...`;

        body.innerHTML = `
            <div class="section">
                <div class="section-title">Pedido</div>
                <div class="grid">
                    <div class="field"><div class="label">UUID</div><div class="value mono">${o.uuid}</div></div>
                    <div class="field"><div class="label">Status</div><div class="value"><span class="badge badge-${o.status}">${o.status}</span></div></div>
                    <div class="field"><div class="label">Canal</div><div class="value">${o.channel || '-'}</div></div>
                    <div class="field"><div class="label">Total</div><div class="value currency" style="color:var(--green)">R$ ${Number(o.total).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</div></div>
                    <div class="field"><div class="label">Criado em</div><div class="value">${fmtDate(o.created_at)}</div></div>
                    <div class="field"><div class="label">Indexado em</div><div class="value">${fmtDate(o.indexed_at)}</div></div>
                </div>
            </div>
            <div class="section">
                <div class="section-title">Cliente</div>
                <div class="grid">
                    <div class="field"><div class="label">ID</div><div class="value">${o.customer.id}</div></div>
                    <div class="field"><div class="label">Nome</div><div class="value">${o.customer.name}</div></div>
                    <div class="field"><div class="label">Email</div><div class="value">${o.customer.email || '-'}</div></div>
                    <div class="field"><div class="label">Documento</div><div class="value mono">${o.customer.document || '-'}</div></div>
                </div>
            </div>
            <div class="section">
                <div class="section-title">Vendedor</div>
                <div class="grid">
                    <div class="field"><div class="label">ID</div><div class="value">${o.seller.id}</div></div>
                    <div class="field"><div class="label">Nome</div><div class="value">${o.seller.name}</div></div>
                    <div class="field"><div class="label">Cidade</div><div class="value">${o.seller.city || '-'}</div></div>
                    <div class="field"><div class="label">Estado</div><div class="value">${o.seller.state || '-'}</div></div>
                </div>
            </div>
            <div class="section">
                <div class="section-title">Itens (${o.items.length})</div>
                <table class="items-tbl">
                    <thead><tr><th>Produto</th><th>Categoria</th><th>Qtd</th><th>Unit.</th><th>Total</th></tr></thead>
                    <tbody>
                        ${o.items.map(i => `<tr>
                            <td>${i.product_name} <span class="mono">#${i.product_id}</span></td>
                            <td>${i.category ? i.category.name + (i.category.sub_category ? ' / ' + i.category.sub_category.name : '') : '-'}</td>
                            <td>${i.quantity}</td>
                            <td class="currency">R$ ${Number(i.unit_price).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                            <td class="currency">R$ ${Number(i.total).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                        </tr>`).join('')}
                        <tr class="total-row">
                            <td colspan="4" style="text-align:right">Total do Pedido</td>
                            <td class="currency">R$ ${Number(o.total).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="section">
                <div class="section-title">Envio</div>
                <div class="grid">
                    <div class="field"><div class="label">Transportadora</div><div class="value">${o.shipment.carrier || '-'}</div></div>
                    <div class="field"><div class="label">Servico</div><div class="value">${o.shipment.service || '-'}</div></div>
                    <div class="field"><div class="label">Status</div><div class="value">${o.shipment.status || '-'}</div></div>
                    <div class="field"><div class="label">Rastreio</div><div class="value mono">${o.shipment.tracking_code || '-'}</div></div>
                </div>
            </div>
            <div class="section">
                <div class="section-title">Pagamento</div>
                <div class="grid">
                    <div class="field"><div class="label">Metodo</div><div class="value">${o.payment.method || '-'}</div></div>
                    <div class="field"><div class="label">Status</div><div class="value">${o.payment.status || '-'}</div></div>
                    <div class="field"><div class="label">Transacao</div><div class="value mono">${o.payment.transaction_id || '-'}</div></div>
                </div>
            </div>
            <div class="section">
                <div class="section-title">Metadata</div>
                <div class="grid">
                    <div class="field"><div class="label">Source</div><div class="value">${o.metadata.source || '-'}</div></div>
                    <div class="field"><div class="label">User Agent</div><div class="value" style="font-size:.8rem">${o.metadata.user_agent || '-'}</div></div>
                    <div class="field"><div class="label">IP</div><div class="value mono">${o.metadata.ip_address || '-'}</div></div>
                </div>
            </div>
        `;
    } catch (e) {
        body.innerHTML = `<div class="empty">Erro: ${e.message}</div>`;
    }
}

function close() { $('overlay').classList.remove('open'); }
function clearFilters() { $('fStatus').value = ''; $('fCustomer').value = ''; $('fProduct').value = ''; loadOrders(0); }
function fmtDate(dt) {
    if (!dt) return '-';
    try { const d = new Date(dt); return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }); }
    catch { return dt; }
}

$('overlay').addEventListener('click', e => { if (e.target === $('overlay')) close(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });

loadOrders(0);
</script>
</body>
</html>
